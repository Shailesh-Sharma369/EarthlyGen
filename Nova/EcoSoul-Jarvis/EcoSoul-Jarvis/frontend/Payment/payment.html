<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Checkout - EcoStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../config.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Poppins", "sans-serif"] },
            colors: {
              eco: {
                50: "#f0fdf4",
                100: "#dcfce7",
                500: "#22c55e",
                600: "#16a34a",
                800: "#166534",
                900: "#14532d",
              },
            },
          },
        },
      };
    </script>
    <style>
      .glass-panel {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
      }
      .qr-container {
        display: none;
      }
      .btn-disabled {
        opacity: 0.5;
        cursor: not-allowed;
        background-color: #9ca3af !important;
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-4 bg-eco-50">
    <div
      class="glass-panel w-full max-w-4xl rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row"
    >
      <div
        class="w-full md:w-5/12 bg-eco-900 text-white p-8 relative overflow-hidden"
      >
        <div
          class="absolute -top-10 -left-10 w-40 h-40 bg-eco-800 rounded-full opacity-50"
        ></div>
        <h2 class="text-2xl font-semibold mb-6 relative z-10">Order Summary</h2>
        <div id="order-summary" class="space-y-4 relative z-10"></div>
        <div class="mt-auto pt-10 relative z-10">
          <div class="flex justify-between text-xl font-bold">
            <span>Total</span><span id="order-total">₹0.00</span>
          </div>
        </div>
      </div>

      <div class="w-full md:w-7/12 p-8 bg-white relative">
        <div id="payment-form-section">
          <h2 class="text-2xl font-bold text-gray-800 mb-6">Details</h2>

          <form id="details-form" class="space-y-4">
            <input
              type="text"
              id="name"
              placeholder="Full Name"
              class="w-full px-4 py-3 rounded-lg border border-gray-300 outline-none focus:border-eco-500"
              required
            />

            <div class="flex gap-2">
              <input
                type="email"
                id="email"
                placeholder="Email Address"
                class="flex-1 px-4 py-3 rounded-lg border border-gray-300 outline-none focus:border-eco-500"
                required
              />
              <button
                type="button"
                id="verify-btn"
                class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-3 rounded-lg transition-colors whitespace-nowrap"
              >
                Verify ID
              </button>
            </div>
            <p id="verify-msg" class="text-xs text-gray-500 h-4"></p>

            <div
              class="flex items-center p-4 border border-eco-200 bg-eco-50 rounded-lg"
            >
              <img
                src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/UPI-Logo-vector.svg/1200px-UPI-Logo-vector.svg.png"
                class="h-8 mr-3"
              />
              <div>
                <p class="font-semibold text-gray-800">UPI QR Code</p>
                <p class="text-xs text-gray-500">
                  Scan with GPay, PhonePe, Paytm
                </p>
              </div>
            </div>

            <button
              type="submit"
              id="generate-btn"
              disabled
              class="btn-disabled w-full bg-eco-600 hover:bg-eco-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all"
            >
              🔒 Verify Email to Pay ₹500
            </button>
          </form>
        </div>

        <div
          id="qr-section"
          class="qr-container flex flex-col items-center justify-center text-center h-full"
        >
          <h3 class="text-xl font-bold text-gray-800 mb-2">Scan to Pay</h3>
          <p class="text-sm text-gray-500 mb-4">
            Open any UPI App and scan this code
          </p>
          <div
            class="p-4 border-2 border-eco-500 border-dashed rounded-xl mb-6"
          >
            <img
              id="qr-image"
              src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/UPI-Logo-vector.svg/1200px-UPI-Logo-vector.svg.png"
              alt="Generating QR..."
              class="w-48 h-48 object-contain"
            />
          </div>
          <div class="text-xs text-gray-400 mb-6">
            Merchant Name:
            <span class="font-bold text-gray-600">EcoStore Demo</span><br />
            <!-- Amount: <span class="font-bold text-gray-600">₹500.00</span> -->
          </div>
          <button
            id="confirm-btn"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md mb-3"
          >
            I Have Made the Payment
          </button>
          <button
            onclick="location.reload()"
            class="text-sm text-gray-500 underline"
          >
            Cancel
          </button>
        </div>

        <div
          id="success-section"
          class="hidden flex flex-col items-center justify-center h-full"
        >
          <div
            class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-4"
          >
            <svg
              class="w-10 h-10 text-green-600"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M5 13l4 4L19 7"
              ></path>
            </svg>
          </div>
          <h3 class="text-2xl font-bold text-gray-800">Order Placed! 🎉</h3>
          <p class="text-gray-500 text-center mt-2">
            Your order has been created and confirmation email sent.
          </p>
          <p class="text-sm text-gray-400 mt-4">
            Redirecting to dashboard in 3 seconds...
          </p>
          <a href="../acc.html"
            ><button
              class="mt-8 px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50"
            >
              Go to Dashboard Now
            </button></a
          >
        </div>
      </div>
    </div>

    <script>
      const API_BASE =
        window.API_CONFIG?.API_URL ||
        `${window.location.protocol}//${window.location.host}/api`;

      // --- CONFIGURATION ---
      const MY_UPI_ID = "8055272590@ptyes";
      const MY_NAME = "EcoStore";
      // const AMOUNT = "500";

      let isEmailVerified = false;

      // --- NEW: DEFINE ITEMS HERE ---
      // This list matches the "Order Summary" displayed on the left side
      // const CART_ITEMS = [
      //     { name: "Bamboo Toothbrush Set", qty: 1, price: 150 },
      //     { name: "Organic Jute Bag", qty: 2, price: 350 }
      // ];

      // --- 1. EMAIL VERIFICATION LOGIC ---
      document
        .getElementById("verify-btn")
        .addEventListener("click", async () => {
          const email = document.getElementById("email").value;
          const msg = document.getElementById("verify-msg");
          const btn = document.getElementById("verify-btn");
          const generateBtn = document.getElementById("generate-btn");

          if (!email.includes("@")) {
            msg.innerText = "Please enter a valid email";
            msg.classList.add("text-red-500");
            return;
          }

          btn.innerText = "Sending...";
          btn.disabled = true;
          btn.classList.add("bg-gray-400");

          try {
            const res = await fetch(`${API_BASE}/payment/send-verification`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email }),
            });

            const data = await res.json();

            if (data.success) {
              msg.innerHTML = `✅ Link sent! <span class="font-bold text-gray-800">Check your Inbox.</span>`;
              msg.classList.remove("text-red-500");
              msg.classList.add("text-green-600");

              setTimeout(() => {
                generateBtn.disabled = false;
                generateBtn.classList.remove("btn-disabled");
                const finalAmount = Math.max(0, AMOUNT - ECO_DISCOUNT);
                generateBtn.innerText = `Generate QR Code to Pay ₹${finalAmount.toFixed(
                  2,
                )}`; // ✅ FIX with eco-discount
                isEmailVerified = true;
                btn.innerText = "Sent";
              }, 1000);
            } else {
              msg.innerText = "Error sending email. Check backend.";
              btn.disabled = false;
              btn.innerText = "Verify ID";
            }
          } catch (err) {
            console.error(err);
            msg.innerText = "Server Error. Is Node.js running?";
            btn.disabled = false;
            btn.innerText = "Verify ID";
          }
        });

      // --- 2. QR GENERATION LOGIC ---
      document
        .getElementById("details-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          if (!isEmailVerified) {
            alert("Please verify your email first!");
            return;
          }

          const finalAmount = Math.max(0, AMOUNT - ECO_DISCOUNT); // Apply discount to QR
          const upiLink = `upi://pay?pa=${MY_UPI_ID}&pn=${MY_NAME}&am=${finalAmount}&cu=INR`;
          const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(
            upiLink,
          )}`;

          document.getElementById("qr-image").src = qrApiUrl;
          document.getElementById("payment-form-section").style.display =
            "none";
          document.getElementById("qr-section").style.display = "flex";
        });

      // --- 3. PAYMENT CONFIRMATION LOGIC ---
      document
        .getElementById("confirm-btn")
        .addEventListener("click", async function () {
          const name = document.getElementById("name").value;
          const email = document.getElementById("email").value;
          const btn = document.getElementById("confirm-btn");

          if (!email || !name) {
            alert("Please fill in your Name and Email first!");
            return;
          }

          btn.innerText = "Processing Order & Sending Email...";
          btn.disabled = true;
          btn.classList.add("bg-gray-400");

          try {
            // Include auth token for creating order
            const token = localStorage.getItem("token");

            console.log("🔄 Sending order confirmation request...");
            console.log("🔑 Token exists:", !!token);
            console.log(
              "🔑 Token preview:",
              token ? token.substring(0, 50) + "..." : "NO TOKEN",
            );
            console.log("📧 Email:", email);
            console.log("👤 Name:", name);
            console.log("💰 Amount:", AMOUNT);
            console.log("🛒 Items:", CART_ITEMS);

            // Decode token to check userId
            if (token) {
              try {
                const parts = token.split(".");
                if (parts.length === 3) {
                  const payload = JSON.parse(atob(parts[1]));
                  console.log("🔓 Decoded token payload:", payload);
                  console.log(
                    "👤 User ID in token:",
                    payload.userId || payload.id,
                  );
                }
              } catch (e) {
                console.error("⚠️ Could not decode token:", e.message);
              }
            }

            const response = await fetch(`${API_BASE}/payment/confirm-order`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
              },
              body: JSON.stringify({
                name: name,
                email: email,
                amount: AMOUNT - ECO_DISCOUNT, // Apply eco-discount to final amount
                originalAmount: AMOUNT,
                ecoDiscountApplied: ECO_DISCOUNT,
                items: CART_ITEMS,
              }),
            });

            console.log("📨 Response status:", response.status);
            const data = await response.json();
            console.log("📊 Response data:", data);

            if (data.success) {
              console.log("✅ Order confirmed successfully!");
              console.log("📧 Order ID:", data.orderId);

              document.getElementById("qr-section").style.display = "none";
              document
                .getElementById("success-section")
                .classList.remove("hidden");
              document.getElementById("success-section").classList.add("flex");

              // Update credits in real-time before redirect
              if (window.updateCreditsAfterPayment) {
                await window.updateCreditsAfterPayment();
              }

              // Trigger notification in dashboard
              if (window.addNotification) {
                window.addNotification(
                  "Order Placed Successfully! 🎉",
                  "Your order has been confirmed. 5 eco-credits have been deducted.",
                  "success",
                );
              }

              // Also update acc.html credits if user opens it
              localStorage.setItem("updateAccCredits", "true");
              localStorage.setItem(
                "lastCreditUpdate",
                new Date().toISOString(),
              );

              // Store notification for dashboard
              localStorage.setItem(
                "orderNotification",
                JSON.stringify({
                  title: "Order Placed Successfully! 🎉",
                  message:
                    "Your order has been confirmed. 5 eco-credits have been deducted.",
                  type: "success",
                }),
              );

              // Redirect to dashboard after 3 seconds
              setTimeout(() => {
                window.location.href = "../acc.html";
              }, 3000);
            } else {
              console.error("❌ Order confirmation failed:", data.message);
              alert(`Order failed: ${data.message || "Unknown error"}`);
              btn.disabled = false;
              btn.innerText = "I Have Made the Payment";
              btn.classList.remove("bg-gray-400");
            }
          } catch (err) {
            console.error("❌ Network error:", err);
            alert("Server error! Make sure backend is running.");
            btn.disabled = false;
            btn.innerText = "I Have Made the Payment";
            btn.classList.remove("bg-gray-400");
          }
        });
    </script>

    <script>
      const API_URL = API_BASE;
      const token = localStorage.getItem("token");

      // ✅ CHECK IF USER IS LOGGED IN
      if (!token) {
        alert("Please login first to access checkout");
        window.location.href = "../login.html";
      }

      let CART_ITEMS = [];
      let AMOUNT = 0;
      let ECO_CREDITS = 0;
      let ECO_DISCOUNT = 0;

      async function loadCartForPayment() {
        try {
          const res = await fetch(`${API_BASE}/cart`, {
            headers: {
              Authorization: `Bearer ${localStorage.getItem("token")}`,
            },
          });

          const data = await res.json();
          console.log("CART API RESPONSE:", data); // DEBUG

          if (!data.success || !data.items || data.items.length === 0) {
            alert("Your cart is empty");
            window.location.href = "../cart.html";
            return;
          }

          CART_ITEMS = [];
          AMOUNT = 0;

          // Get eco-credits and discount info from cart response
          ECO_CREDITS = data.ecoCredits || 0;
          ECO_DISCOUNT = data.discountAmount || 0; // Actual discount that can be applied

          data.items.forEach((item) => {
            const price = Number(item.productId.price); // 🔥 force number
            const qty = Number(item.quantity);

            CART_ITEMS.push({
              productId: item.productId._id, // ✅ Include productId for backend
              name: item.productId.name,
              qty: qty,
              price: price,
            });

            AMOUNT += price * qty; // 🔥 real calculation
          });

          updateOrderSummaryUI();
        } catch (err) {
          console.error("Cart load failed:", err);
          alert("Failed to load cart");
        }
      }

      function updateOrderSummaryUI() {
        const container = document.getElementById("order-summary");

        let cartHTML = CART_ITEMS.map(
          (item) => `
    <div class="flex items-center space-x-4 bg-eco-800 p-3 rounded-xl bg-opacity-50">
      <div>
        <p class="font-medium text-sm">${item.name}</p>
        <p class="text-eco-100 text-xs">Qty: ${item.qty}</p>
      </div>
      <div class="ml-auto font-semibold">
        ₹${(item.price * item.qty).toFixed(2)}
      </div>
    </div>
  `,
        ).join("");

        // Calculate final amount with eco-discount applied
        const finalAmount = Math.max(0, AMOUNT - ECO_DISCOUNT);

        // Add eco-credits discount section if applicable
        if (ECO_DISCOUNT > 0) {
          cartHTML += `
    <div class="mt-4 p-3 bg-green-100 border border-green-300 rounded-lg">
      <div class="flex justify-between text-sm font-semibold text-green-700">
        <span>🌱 Eco-Credits Discount</span>
        <span>-₹${ECO_DISCOUNT.toFixed(2)}</span>
      </div>
      <p class="text-xs text-green-600 mt-1">✅ Applied: 5 eco-credits discount (flat per order)</p>
      <p class="text-xs text-gray-500 mt-2">Your Balance: ${ECO_CREDITS} credits</p>
    </div>
  `;
        }

        container.innerHTML = cartHTML;

        // 🔥 TOTAL UPDATE WITH ECO-DISCOUNT
        document.getElementById("generate-btn").innerText =
          `Generate QR Code to Pay ₹${finalAmount.toFixed(2)}`;

        // If total text exists
        const totalText = document.getElementById("order-total");
        if (totalText) {
          totalText.innerText = `₹${finalAmount.toFixed(2)}`;
        }
      }

      document.addEventListener("DOMContentLoaded", loadCartForPayment);
    </script>

    <!-- Real-time credits update after payment -->
    <script type="module">
      import { updateCreditsDisplay } from "../cartApi.js";

      // Make it globally available for payment confirmation
      window.updateCreditsAfterPayment = async function () {
        console.log("🌱 Updating credits after payment...");
        await updateCreditsDisplay();
      };
    </script>
  </body>
</html>
