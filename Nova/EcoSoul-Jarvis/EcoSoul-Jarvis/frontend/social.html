      async function loadUserConversation(userId) {
        try {
          const token = localStorage.getItem("token");
          if (!token) return;

          let messages = [];

          // Handle admin messages specially
          if (userId === "admin") {
            const res = await fetch(`${API_BASE}/admin/messages`, {
              headers: { Authorization: `Bearer ${token}` },
            });

            if (!res.ok) {
              console.error("Failed to load admin messages:", res.status);
              return;
            }

            const adminMessages = await res.json();
            console.log("📨 Loaded admin messages:", adminMessages);
            console.log("📨 Current user ID:", state.me.id);

            // Filter to only messages that involve this user
            messages = (adminMessages || [])
              .filter((msg) => {
                const receiverId = msg.receiverId?._id || msg.receiverId;
                return msg.isBroadcast || receiverId === state.me.id;
              })
              .map((msg) => ({
                text: msg.text,
                senderId: "admin",
                receiverId: msg.receiverId,
                timestamp: msg.createdAt,
                _id: msg._id,
                // ✅ Include media fields from backend and convert URLs
                ...(msg.mediaType && { mediaType: msg.mediaType }),
                ...(msg.mediaUrl && { mediaUrl: getMediaUrl(msg.mediaUrl) }),
                ...(msg.fileName && { fileName: msg.fileName }),
                ...(msg.fileSize && { fileSize: msg.fileSize }),
              }));

            console.log("📨 Filtered admin messages:", messages);
          } else {
            // Regular user messages
            const res = await fetch(`${API_BASE}/messages/${userId}`, {
              headers: { Authorization: `Bearer ${token}` },
            });

            if (!res.ok) {
              console.error("Failed to load conversation:", res.status);
              return;
            }

            messages = await res.json();
            console.log("📨 Loaded conversation:", messages);
            console.log("📨 Number of messages:", messages.length);
            messages.forEach((msg, idx) => {
              console.log(`📨 Message ${idx + 1}:`, {
                _id: msg._id,
                text: msg.text?.substring(0, 30),
                hasMediaType: !!msg.mediaType,
                mediaType: msg.mediaType,
                hasMediaUrl: !!msg.mediaUrl,
                mediaUrl: msg.mediaUrl,
                fileName: msg.fileName,
                timestamp: msg.timestamp,
              });
            });
          }

          // Update state with loaded messages
          const existingChat = state.messages.find((m) => m.userId === userId);

          if (existingChat) {
            // Update existing conversation
            existingChat.conversation = messages.map((msg) => ({
              text: msg.text,
              by: msg.senderId,
              timestamp: msg.timestamp,
              _id: msg._id,
              // ✅ Include media fields from backend and convert URLs
              ...(msg.mediaType && { mediaType: msg.mediaType }),
              ...(msg.mediaUrl && { mediaUrl: getMediaUrl(msg.mediaUrl) }),
              ...(msg.fileName && { fileName: msg.fileName }),
              ...(msg.fileSize && { fileSize: msg.fileSize }),
            }));
          } else {
            // Create new conversation entry
            const user =
              userId === "admin"
                ? {
                    name: "🔔 Admin",
                    avatar:
                      "https://placehold.co/48x48/3b82f6/FFFFFF?text=Admin",
                  }
                : state.users[userId];

            state.messages.push({
              userId: userId,
              user: user,
              conversation: messages.map((msg) => ({
                text: msg.text,
                by: msg.senderId,
                timestamp: msg.timestamp,
                _id: msg._id,
                // ✅ Include media fields from backend and convert URLs
                ...(msg.mediaType && { mediaType: msg.mediaType }),
                ...(msg.mediaUrl && { mediaUrl: getMediaUrl(msg.mediaUrl) }),
                ...(msg.fileName && { fileName: msg.fileName }),
                ...(msg.fileSize && { fileSize: msg.fileSize }),
              })),
            });
          }

          renderAll();
        } catch (err) {
          console.error("Error loading conversation:", err);
        }
      }

      async function deleteUserMessage(messageId) {
        if (!confirm("Are you sure you want to delete this message?")) {
          return;
        }

        try {
          const token = localStorage.getItem("token");
          if (!token) {
            alert("Please login to delete messages");
            return;
          }

          console.log("🗑️ Deleting message:", messageId);

          // ✅ Use /messages/:messageId endpoint for user message deletion (not /admin/messages)
          const res = await fetch(`${API_BASE}/messages/${messageId}`, {
            method: "DELETE",
            headers: {
              Authorization: `Bearer ${token}`,
            },
          });

          if (!res.ok) {
            if (res.status === 404) {
              console.warn("⚠️ Message not found (may already be deleted)");
              // Continue to remove from UI even if not found on server
            } else {
              const error = await res.json();
              throw new Error(
                error.error || error.message || `HTTP ${res.status}`,
              );
            }
          }

          console.log("✅ Message deleted:", messageId);

          // Remove from state
          if (state.messages && Array.isArray(state.messages)) {
            state.messages.forEach((chat) => {
              if (chat.conversation && Array.isArray(chat.conversation)) {
                const index = chat.conversation.findIndex(
                  (m) => m._id === messageId,
                );
                if (index !== -1) {
                  chat.conversation.splice(index, 1);
                }
              }
            });
          }

          // Call renderAll if available
          if (typeof renderAll === "function") {
            renderAll();
          } else {
            console.warn("⚠️ renderAll not available, reloading page");
            location.reload();
          }
        } catch (err) {
          console.error("❌ Error deleting message:", err);
          alert("Failed to delete message: " + err.message);
        }
      }

    <script>
      // ============ INSTAGRAM-STYLE FEATURES ============

      // Show Followers/Following Modal
      window.showFollowersModal = async function (userId, type) {
        const token = localStorage.getItem("token");
        if (!token) {
          alert("Please login to view this");
          return;
        }

        const modal = document.createElement("div");
        modal.id = "followers-modal";
        modal.className =
          "fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50";
        modal.innerHTML = `
          <div class="bg-white rounded-lg w-full max-w-md max-h-96 overflow-hidden" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between p-4 border-b">
              <h3 class="font-bold text-lg">${type === "followers" ? "Followers" : "Following"}</h3>
              <button onclick="document.getElementById('followers-modal').remove()" class="text-gray-500 hover:text-gray-700">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                </svg>
              </button>
            </div>
            <div class="overflow-y-auto max-h-80 p-4" id="followers-list">
              <div class="flex items-center justify-center py-8">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-green-600"></div>
              </div>
            </div>
          </div>
        `;

        document.body.appendChild(modal);
        modal.onclick = () => modal.remove();

        // Fetch followers/following from backend
        try {
          const endpoint =
            type === "followers"
              ? `${API_BASE}/users/${userId}/followers`
              : `${API_BASE}/users/${userId}/following`;

          const response = await fetch(endpoint, {
            headers: { Authorization: `Bearer ${token}` },
          });

          if (!response.ok) {
            throw new Error("Failed to load " + type);
          }

          const users = await response.json();
          const listContainer = document.getElementById("followers-list");

          if (users.length === 0) {
            listContainer.innerHTML = `<p class="text-center text-gray-500 py-8">No ${type} yet</p>`;
            return;
          }

          listContainer.innerHTML = users
            .map((user) => {
              const isFollowing =
                state.me.following?.includes(user._id || user.id) || false;
              const isMe = (user._id || user.id) === state.me.id;

              // Get real-time profile pic from localStorage
              const userId = user._id || user.id;
              const syncedAvatar = localStorage.getItem(`profilePic_${userId}`);
              const userAvatar =
                syncedAvatar || user.avatar || "https://placehold.co/48x48";

              return `
              <div class="flex items-center justify-between py-3 border-b last:border-0">
                <div class="flex items-center gap-3 cursor-pointer" onclick="viewUserProfile('${user._id || user.id}')">
                  <img src="${userAvatar}" class="w-12 h-12 rounded-full object-cover border-2 border-gray-200">
                  <div>
                    <div class="font-semibold">${user.name || user.fullName || "User"}</div>
                    <div class="text-xs text-gray-500">@${(user.email || "").split("@")[0]}</div>
                  </div>
                </div>
                ${
                  !isMe
                    ? `
                  <button onclick="quickFollow('${user._id || user.id}', this)" 
                    class="px-4 py-1.5 rounded-md text-sm font-semibold ${isFollowing ? "bg-gray-200 text-gray-800" : "bg-green-600 text-white"}"
                    data-following="${isFollowing}">
                    ${isFollowing ? "Following" : "Follow"}
                  </button>
                `
                    : ""
                }
              </div>
            `;
            })
            .join("");
        } catch (err) {
          console.error("Error loading " + type + ":", err);
          document.getElementById("followers-list").innerHTML =
            `<p class="text-center text-red-500 py-8">Failed to load ${type}</p>`;
        }
      };

      // Quick follow from modal
      window.quickFollow = async function (userId, btn) {
        const token = localStorage.getItem("token");
        if (!token) return;

        const isFollowing = btn.dataset.following === "true";
        btn.disabled = true;
        btn.textContent = isFollowing ? "Unfollowing..." : "Following...";

        try {
          const endpoint = isFollowing
            ? `${API_BASE}/users/${userId}/unfollow`
            : `${API_BASE}/users/${userId}/follow`;

          const response = await fetch(endpoint, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
            },
          });

          if (!response.ok) throw new Error("Failed to follow/unfollow");

          // Update UI
          if (isFollowing) {
            btn.textContent = "Follow";
            btn.className =
              "px-4 py-1.5 rounded-md text-sm font-semibold bg-green-600 text-white";
            btn.dataset.following = "false";
            state.me.following = state.me.following.filter(
              (id) => id !== userId,
            );
          } else {
            btn.textContent = "Following";
            btn.className =
              "px-4 py-1.5 rounded-md text-sm font-semibold bg-gray-200 text-gray-800";
            btn.dataset.following = "true";
            if (!state.me.following) state.me.following = [];
            state.me.following.push(userId);

            // Send socket notification
            if (window.socket) {
              window.socket.emit("follow-user", {
                targetUserId: userId,
                followerName: state.me.name,
              });
            }
          }
        } catch (err) {
          console.error("Follow error:", err);
          alert("Failed to " + (isFollowing ? "unfollow" : "follow"));
        } finally {
          btn.disabled = false;
        }
      };

      // View user profile from modal
      window.viewUserProfile = function (userId) {
        document.getElementById("followers-modal")?.remove();
        state.currentProfileUser = userId;
        state.currentPage = "Profile";

        // ✅ Start watching this user's profile for real-time pic updates
        if (window.ProfilePicSync) {
          window.ProfilePicSync.watchProfileUser(userId);
        }

        if (typeof renderAll === "function") renderAll();
      };

      // Double-tap to like posts (Instagram-style)
      document.addEventListener("DOMContentLoaded", () => {
        let lastTap = 0;

        document.body.addEventListener("click", (e) => {
          const img = e.target.closest('[data-likeable="true"]');
          if (!img) return;

          const currentTime = new Date().getTime();
          const tapGap = currentTime - lastTap;

          if (tapGap < 300 && tapGap > 0) {
            // Double tap detected!
            const container = img.closest("[data-post-id]");
            if (!container) return;

            const postId = container.dataset.postId;
            const post = state.posts.find((p) => p.id === postId);

            if (post && !post.liked) {
              // Like the post
              post.liked = true;
              post.likes++;

              // Show heart animation
              showLikeAnimation(img);

              // Call backend API to persist like
              likePostBackend(postId);

              // Update UI
              if (typeof renderAll === "function") renderAll();
            }

            lastTap = 0; // Reset
          } else {
            lastTap = currentTime;
          }
        });
      });

      function showLikeAnimation(element) {
        const container =
          element.closest(".post-image-container") || element.parentElement;
        const heart = document.createElement("div");
        heart.className = "like-heart-animation";
        heart.innerHTML = "❤️";
        container.style.position = "relative";
        container.appendChild(heart);

        setTimeout(() => heart.remove(), 1000);
      }

      async function likePostBackend(postId) {
        const token = localStorage.getItem("token");
        if (!token) return;

        try {
          const response = await fetch(`${API_BASE}/posts/${postId}/like`, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
            },
          });

          if (response.ok) {
            console.log("✅ Post liked successfully");

            // Emit socket event for real-time notification
            if (window.socket) {
              const post = state.posts.find((p) => p.id === postId);
              if (post) {
                window.socket.emit("like-post", {
                  postId: postId,
                  postOwnerId: post.authorId,
                  userName: state.me.name,
                });
              }
            }
          }
        } catch (err) {
          console.error("❌ Like post error:", err);
        }
      }

      // Chat typing indicator
      let typingTimeout;
      document.addEventListener("DOMContentLoaded", () => {
        document.body.addEventListener("input", (e) => {
          if (e.target.id === "chatInput") {
            const token = localStorage.getItem("token");
            if (!token || !window.socket || !state.currentChatUser) return;

            // Emit typing event
            window.socket.emit("typing", {
              to: state.currentChatUser,
              userId: state.me.id,
              userName: state.me.name,
              isTyping: true,
            });

            // Clear previous timeout
            clearTimeout(typingTimeout);

            // Stop typing after 2 seconds of no input
            typingTimeout = setTimeout(() => {
              window.socket.emit("typing", {
                to: state.currentChatUser,
                userId: state.me.id,
                userName: state.me.name,
                isTyping: false,
              });
            }, 2000);
          }
        });

          headers: {
            Authorization: `Bearer ${token}`,
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ reaction }),
        })
          .then((res) => res.json())
          .then((data) => {
            console.log("✅ Story reaction sent:", data);
            showNotification(`Sent ${reaction} reaction!`, "success");
          })
          .catch((err) => {
            console.error("❌ Story reaction error:", err);

      function showReactionAnimation(reaction) {
        const emojis = {
          like: "❤️",
          love: "😍",
          haha: "😂",
          wow: "😮",
          sad: "😢",
          fire: "🔥",
        };

        const emoji = document.createElement("div");
        emoji.textContent = emojis[reaction] || "❤️";
        emoji.style.cssText = `
          position: fixed;
          bottom: 100px;
          left: 50%;
          transform: translateX(-50%);
          font-size: 64px;
          animation: floatUp 1.5s ease-out forwards;

      style.textContent = `

      // Share post functionality
      window.sharePost = async function (postId) {
        const post = state.posts.find((p) => p.id === postId);
        if (!post) return;

        const author = state.users[post.authorId] || { name: "User" };
        const shareText = `Check out this post by ${author.name}: ${post.text?.substring(0, 100) || "Amazing content!"}`;
        const shareUrl = `${window.location.origin}/post/${postId}`;

        if (navigator.share) {
          try {
            await navigator.share({
              title: `Post by ${author.name}`,
              text: shareText,
              url: shareUrl,
            });
            showNotification("Post shared successfully!", "success");
          } catch (err) {
            if (err.name !== "AbortError") {
              console.error("Share error:", err);
              copyToClipboard(shareUrl);
            }
          }
        } else {
          // Fallback: Copy to clipboard
          copyToClipboard(shareUrl);
        }
      };

      function copyToClipboard(text) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
        showNotification("Link copied to clipboard!", "success");
      }

      // Upload profile photo
      window.uploadProfilePhoto = function () {
        // Remove menu modal
        document.querySelector(".fixed.inset-0")?.remove();

        // Create file input
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;

          // Show loading
          showNotification("Uploading photo...", "info");

          try {
            // Get authentication token
            const token = localStorage.getItem("token");
            if (!token) {
              showNotification("Please login first", "error");
              return;
            }

            // Upload file
            const formData = new FormData();
            formData.append("media", file);
            formData.append("mediaType", "image");

            const uploadRes = await fetch(`${API_BASE}/messages/upload`, {
              method: "POST",
              headers: {
                Authorization: `Bearer ${token}`,
              },
              body: formData,
            });

            if (!uploadRes.ok) throw new Error("Upload failed");

            const uploadData = await uploadRes.json();
            const photoUrl = getMediaUrl(uploadData.url);

            // Update profile
            await updateProfilePhoto(photoUrl);
          } catch (err) {
            console.error("Upload error:", err);
            showNotification("Failed to upload photo", "error");
          }
        };
        input.click();
      };

      // Update profile photo
      async function updateProfilePhoto(photoUrl) {
        try {

          if (!token) throw new Error("Not authenticated");

          const res = await fetch(`${API_BASE}/users/profile`, {
            method: "PUT",
            headers: {
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              profilePic: photoUrl,
            }),
          });

          if (!res.ok) throw new Error("Update failed");

          const data = await res.json();

          // Update state
          state.me.avatar = photoUrl;

          // ✅ TASK 1: Save avatar to localStorage for realtime sync everywhere
          localStorage.setItem(`profilePic_${state.me.id}`, photoUrl);
          console.log("📷 Avatar saved to localStorage for realtime sync");

          // Update UI immediately
          const profileImg = document.getElementById("profileImage");
          if (profileImg) profileImg.src = photoUrl;

          // Update sidebar profile pic
          state.users[state.me.id] = {
            ...state.users[state.me.id],
            avatar: photoUrl,
          };

          // ✅ Re-render ALL posts and components to sync avatar everywhere in realtime
          console.log("🔄 Re-rendering to sync avatar in all posts...");
          renderAll();

          showNotification("Profile photo updated!", "success");

          // Broadcast update to other connected users via socket
          if (window.socket && window.socket.connected) {
            window.socket.emit("profile-photo-updated", {
              userId: state.me.id,
              photoUrl: photoUrl,
              timestamp: Date.now(),
            });
            console.log("📡 Socket.IO broadcast sent");
          }

          // Sync to acc.html via localStorage
          syncProfileToAcc(photoUrl);
        } catch (err) {
          console.error("Profile update error:", err);
          showNotification("Failed to update photo", "error");
        }
      }

      // ===== GAME 1: SUBWAY SURFER 2 =====
      window.initSubwaySurfer2Game = function () {
        const canvas = document.getElementById("subway2Canvas");
        const ctx = canvas.getContext("2d");
        let score = 0;
        let gameOver = false;

        const player = {
          x: canvas.width / 2 - 15,
          y: canvas.height - 80,
          width: 30,
          height: 40,
          speed: 7,
        };

        let obstacles = [];
        let powerups = [];
        let distance = 0;
        let speed = 2;

        const keys = {};
        window.addEventListener("keydown", (e) => {
          keys[e.key] = true;
        });
        window.addEventListener("keyup", (e) => {
          keys[e.key] = false;
        });

        function updatePlayer() {
          if (keys["ArrowLeft"] || keys["a"] || keys["A"])
            player.x -= player.speed;
          if (keys["ArrowRight"] || keys["d"] || keys["D"])
            player.x += player.speed;

          player.x = Math.max(
            0,
            Math.min(canvas.width - player.width, player.x),
          );

          // Check collisions with obstacles
          obstacles.forEach((obs) => {
            if (
              player.x < obs.x + obs.width &&
              player.x + player.width > obs.x &&
              player.y < obs.y + obs.height &&
              player.y + player.height > obs.y
            ) {
              gameOver = true;
            }
          });

          // Check collisions with powerups
          powerups.forEach((pup, idx) => {
            if (
              player.x < pup.x + pup.size &&
              player.x + player.width > pup.x &&
              player.y < pup.y + pup.size &&
              player.y + player.height > pup.y
            ) {
              score += 5;
              powerups.splice(idx, 1);
            }
          });
        }

        function spawnObstacle() {
          if (Math.random() < 0.03) {
            obstacles.push({
              x: Math.random() * (canvas.width - 40),
              y: -50,
              width: 40,
              height: 50,
            });
          }
        }

        function spawnPowerup() {
          if (Math.random() < 0.01) {
            powerups.push({
              x: Math.random() * (canvas.width - 20),
              y: -20,
              size: 20,
            });
          }
        }

        function updateObjects() {
          obstacles = obstacles.filter((obs) => {
            obs.y += speed;
            return obs.y < canvas.height;
          });

          powerups = powerups.filter((pup) => {
            pup.y += speed;
            return pup.y < canvas.height;
          });

          distance += speed;
          score = Math.floor(distance * (speed / 2));
          speed = 2 + distance / 5000;
        }

        function draw() {
          ctx.fillStyle = "#FFF8DC";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // Draw road lines
          ctx.strokeStyle = "#FFD700";
          ctx.lineWidth = 3;
          ctx.setLineDash([20, 10]);
          ctx.beginPath();
          ctx.moveTo(canvas.width / 2, 0);
          ctx.lineTo(canvas.width / 2, canvas.height);
          ctx.stroke();
          ctx.setLineDash([]);

          // Draw obstacles (trains/cars)
          ctx.fillStyle = "#FF4444";
          obstacles.forEach((obs) => {
            ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            ctx.fillStyle = "#333";
            ctx.fillRect(obs.x + 5, obs.y + 5, 8, 8);
            ctx.fillRect(obs.x + obs.width - 13, obs.y + 5, 8, 8);
            ctx.fillStyle = "#FF4444";
          });

          // Draw powerups (coins)
          ctx.fillStyle = "#FFD700";
          powerups.forEach((pup) => {
            ctx.beginPath();
            ctx.arc(
              pup.x + pup.size / 2,
              pup.y + pup.size / 2,
              pup.size / 2,
              0,
              Math.PI * 2,
            );
            ctx.fill();
            ctx.strokeStyle = "#FFA500";
            ctx.lineWidth = 2;
            ctx.stroke();
          });

          // Draw player
          ctx.fillStyle = "#4169E1";
          ctx.fillRect(player.x, player.y, player.width, player.height);
          ctx.fillStyle = "#FFD700";
          ctx.beginPath();
          ctx.arc(
            player.x + player.width / 2,
            player.y + 10,
            5,
            0,
            Math.PI * 2,
          );
          ctx.fill();
        }

        function gameLoop() {
          if (gameOver) {
            const bestscore = parseInt(
              localStorage.getItem("game_subway2_score") || "0",
            );
            if (score > bestscore) {
              localStorage.setItem("game_subway2_score", score);
              showNotification(
                `🚀 New Subway Surfer 2 Record: ${score}!`,
                "success",
              );
            }
            document.getElementById("subway2-score").textContent = score;
            ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#FFF";
            ctx.font = "bold 32px Arial";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 40);
            ctx.font = "20px Arial";
            ctx.fillText(
              `Final Score: ${score}`,
              canvas.width / 2,
              canvas.height / 2 + 20,
            );
            ctx.fillText(
              "Close to try again",
              canvas.width / 2,
              canvas.height / 2 + 60,
            );
            return;
          }

          updatePlayer();
          spawnObstacle();
          spawnPowerup();
          updateObjects();
          draw();
          document.getElementById("subway2-score").textContent = score;
          requestAnimationFrame(gameLoop);
        }

        gameLoop();
      };

      // ===== GAME 3: ECO RUNNER (SUBWAY SURFER-LIKE) =====
      window.initRunnerGame = function () {
        const canvas = document.getElementById("runnerCanvas");
        const ctx = canvas.getContext("2d");
        let score = 0;
        let gameOver = false;
        let distance = 0;

        const player = {
          x: canvas.width / 2 - 15,
          y: canvas.height - 100,
          width: 30,
          height: 40,
          velocityX: 0,
          speed: 7,
        };

        const obstacles = [];
        const powerups = [];
        let spawnRate = 0;

        const keys = {};
        window.addEventListener("keydown", (e) => {
          keys[e.key] = true;
        });
        window.addEventListener("keyup", (e) => {
          keys[e.key] = false;
        });

        function updatePlayer() {
          if (keys["ArrowLeft"] || keys["a"])
            player.x = Math.max(0, player.x - player.speed);
          if (keys["ArrowRight"] || keys["d"])
            player.x = Math.min(
              canvas.width - player.width,
              player.x + player.speed,
            );
        }

        function spawnObstacle() {
          if (spawnRate++ % 80 === 0) {
            obstacles.push({
              x: Math.random() * (canvas.width - 40),
              y: -40,
              width: 40,
              height: 40,
              speed: 5 + distance / 1000,
            });
          }
          if (spawnRate % 300 === 0) {
            powerups.push({
              x: Math.random() * (canvas.width - 30),
              y: -30,
              width: 30,
              height: 30,
              speed: 4,
            });
          }
        }

        function updateObjects() {
          obstacles.forEach((obs, idx) => {
            obs.y += obs.speed;
            if (obs.y > canvas.height) obstacles.splice(idx, 1);

            if (
              player.x < obs.x + obs.width &&
              player.x + player.width > obs.x &&
              player.y < obs.y + obs.height &&
              player.y + player.height > obs.y
            ) {
              gameOver = true;
            }
          });

          powerups.forEach((pw, idx) => {
            pw.y += pw.speed;
            if (pw.y > canvas.height) powerups.splice(idx, 1);

            if (
              player.x < pw.x + pw.width &&
              player.x + player.width > pw.x &&
              player.y < pw.y + pw.height &&
              player.y + player.height > pw.y
            ) {
              score += 5;
              powerups.splice(idx, 1);
            }
          });

          distance += 2;
          score = Math.floor(distance * (1 + spawnRate / 5000));
        }

        function draw() {
          // Sky
          ctx.fillStyle = "rgba(135, 206, 235, 0.3)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // Ground
          ctx.fillStyle = "#90EE90";
          ctx.fillRect(0, canvas.height - 60, canvas.width, 60);

          // Obstacles
          obstacles.forEach((obs) => {
            ctx.fillStyle = "#DC143C";
            ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            ctx.fillText("☢️", obs.x + 5, obs.y + 25);
          });

          // Powerups
          powerups.forEach((pw) => {
            ctx.fillStyle = "#FFD700";
            ctx.fillRect(pw.x, pw.y, pw.width, pw.height);
            ctx.font = "20px Arial";
            ctx.fillText("⭐", pw.x + 3, pw.y + 22);
          });

          // Player
          ctx.fillStyle = "#4169E1";
          ctx.fillRect(player.x, player.y, player.width, player.height);
          ctx.font = "20px Arial";
          ctx.fillText("🏃", player.x + 2, player.y + 28);
        }

        function gameLoop() {
          if (gameOver) {
            const bestscore = parseInt(
              localStorage.getItem("game_runner_score") || "0",
            );
            if (score > bestscore) {
              localStorage.setItem("game_runner_score", score);
              showNotification(
                `🏃 New Runner Game Record: ${score}!`,
                "success",
              );
            }
            document.getElementById("runner-score").textContent = score;
            ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#FFF";
            ctx.font = "bold 32px Arial";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 40);
            ctx.font = "20px Arial";
            ctx.fillText(
              `Final Score: ${score}`,
              canvas.width / 2,
              canvas.height / 2 + 20,
            );
            ctx.fillText(
              "Distance: " + Math.floor(distance / 100) + "m",
              canvas.width / 2,
              canvas.height / 2 + 60,
            );
            return;
          }

          updatePlayer();
          spawnObstacle();
          updateObjects();
          draw();
          document.getElementById("runner-score").textContent = score;
          requestAnimationFrame(gameLoop);
        }

        gameLoop();
      };

      // ===== GAME 4: MEMORY MATCH GAME =====
      window.initMemoryGame = function () {
        const ecoItems = [
          "🌱",
          "🌱",
          "🌿",
          "🌿",
          "♻️",
          "♻️",
          "🌍",
          "🌍",
          "🌳",
          "🌳",
          "💚",
          "💚",
          "🌊",
          "🌊",
          "☀️",
          "☀️",
        ];

        let score = 0;
        let matches = 0;
        let flipped = [];
        let matched = [];
        const grid = document.getElementById("memory-grid");
        let gameOver = false;

        // Shuffle array
        function shuffle(arr) {
          return arr.sort(() => Math.random() - 0.5);
        }

        // Create cards
        function createCards() {
          grid.innerHTML = "";
          const shuffled = shuffle([...ecoItems]);
          shuffled.forEach((item, index) => {
            const card = document.createElement("div");
            card.className =
              "bg-gradient-to-br from-purple-400 to-indigo-500 rounded-lg p-4 h-24 flex items-center justify-center cursor-pointer text-4xl transform transition-transform hover:scale-105 shadow-lg";
            card.style.perspective = "1000px";
            card.dataset.index = index;
            card.dataset.item = item;
            card.innerHTML = "?";
            card.style.color = "white";
            card.style.fontWeight = "bold";
            card.style.fontSize = "2rem";

            card.addEventListener("click", () => flipCard(card, index));
            grid.appendChild(card);
          });
        }

        // Flip card
        function flipCard(card, index) {
          if (gameOver || matched.includes(index) || flipped.includes(index))
            return;
          if (flipped.length >= 2) return;

          card.innerHTML = card.dataset.item;
          card.style.backgroundColor = "#fbbf24";
          flipped.push(index);

          if (flipped.length === 2) {
            checkMatch();
          }
        }

        // Check for match
        function checkMatch() {
          const [idx1, idx2] = flipped;
          const card1 = grid.children[idx1];
          const card2 = grid.children[idx2];

          if (card1.dataset.item === card2.dataset.item) {
            score += 10;
            matches++;
            matched.push(idx1, idx2);
            card1.style.backgroundColor = "#34d399";
            card2.style.backgroundColor = "#34d399";
            card1.style.opacity = "0.7";
            card2.style.opacity = "0.7";

            if (matches === 8) {
              gameOver = true;
              setTimeout(() => {
                document.getElementById("memory-status").innerHTML =
                  `<div class="text-center py-8"><h3 class="text-2xl font-bold mb-4">🎉 Perfect!</h3><p class="text-lg mb-2">You matched all 8 pairs!</p><p class="text-lg font-bold mb-4">Final Score: ${score}</p><button onclick="window.closeGame()" class="bg-purple-600 text-white px-6 py-2 rounded-lg font-bold">Close</button></div>`;
                localStorage.setItem(
                  "game_memory_score",
                  Math.max(
                    score,
                    parseInt(localStorage.getItem("game_memory_score") || "0"),
                  ),
                );
              }, 500);
            }
            flipped = [];
          } else {
            setTimeout(() => {
              card1.innerHTML = "?";
              card2.innerHTML = "?";
              card1.style.backgroundColor = "";
              card2.style.backgroundColor = "";
              card1.className =
                "bg-gradient-to-br from-purple-400 to-indigo-500 rounded-lg p-4 h-24 flex items-center justify-center cursor-pointer text-4xl transform transition-transform hover:scale-105 shadow-lg";
              card2.className =
                "bg-gradient-to-br from-purple-400 to-indigo-500 rounded-lg p-4 h-24 flex items-center justify-center cursor-pointer text-4xl transform transition-transform hover:scale-105 shadow-lg";
              card1.style.color = "white";
              card2.style.color = "white";
              card1.style.fontWeight = "bold";
              card2.style.fontWeight = "bold";
              card1.style.fontSize = "2rem";
              card2.style.fontSize = "2rem";
              flipped = [];
            }, 1000);
          }

          document.getElementById("memory-score").textContent = score;
          document.getElementById("memory-matches").textContent = matches;
        }

        createCards();
      };
    </script>

        style="
          background: #fff;
          border-radius: 14px;
          padding: 32px 36px;
          max-width: 360px;
          width: 90%;
          text-align: center;
          box-shadow: 0 12px 40px rgba(0, 0, 0, 0.22);
        "
      >
        <h3
          style="
            margin: 0 0 10px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #1e293b;
          "
        >
          Confirm Logout
        </h3>
        <p style="color: #64748b; margin: 0 0 28px; font-size: 0.95rem">
          Are you sure you want to log out?
        </p>
        <div style="display: flex; gap: 12px; justify-content: center">
          <button
            id="social-logout-cancel"
            style="
              padding: 10px 24px;
              border-radius: 8px;
              border: 1px solid #e2e8f0;
              background: #f8fafc;
              cursor: pointer;
              font-size: 0.95rem;
              font-weight: 500;
            "
          >
            Cancel
          </button>
          <button
            id="social-logout-confirm"
            style="
              padding: 10px 24px;
              border-radius: 8px;
              border: none;
              background: #ef4444;
              color: #fff;
              cursor: pointer;
              font-size: 0.95rem;
              font-weight: 700;
            "
          >
            Logout
          </button>
        </div>
      </div>
    </div>

    <script>
      (function () {
        function _setupSocialLogout() {
          const modal = document.getElementById("social-logout-modal");
          const cancelBtn = document.getElementById("social-logout-cancel");
          const confirmBtn = document.getElementById("social-logout-confirm");
          if (!modal) return;

          cancelBtn &&
            cancelBtn.addEventListener("click", function () {
              modal.style.display = "none";
            });

          confirmBtn &&
            confirmBtn.addEventListener("click", function () {
              localStorage.removeItem("token");
              localStorage.removeItem("isLoggedIn");
              localStorage.removeItem("userName");
              localStorage.removeItem("userEmail");
              localStorage.removeItem("userId");
              localStorage.removeItem("loginTime");
              if (localStorage.getItem("userType") === "user")
                localStorage.removeItem("userType");
              sessionStorage.clear();
              setTimeout(function () {
                window.location.href = "homepage.html";
              }, 350);
            });

          modal.addEventListener("click", function (e) {
            if (e.target === modal) modal.style.display = "none";
          });
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", _setupSocialLogout);
        } else {
          _setupSocialLogout();
        }
      })();
    </script>
  </body>
</html>
