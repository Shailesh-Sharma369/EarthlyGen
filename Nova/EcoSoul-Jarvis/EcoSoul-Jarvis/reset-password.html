<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - EcoSoul Jarvis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>
  </head>
  <body
    class="bg-gradient-to-br from-green-50 to-blue-50 min-h-screen flex items-center justify-center p-4"
  >
    <div class="bg-white rounded-lg shadow-xl max-w-md w-full p-8">
      <!-- Header -->
      <div class="text-center mb-8">
        <div class="flex justify-center mb-4">
          <div class="bg-green-100 p-3 rounded-full">
            <svg
              class="w-8 h-8 text-green-600"
              fill="currentColor"
              viewBox="0 0 20 20"
            >
              <path
                d="M10.894 2.553a.75.75 0 00-1.788 0l-.27 4.217H4.896a.75.75 0 000 1.5h4.022l-.353 5.5H2.75a.75.75 0 000 1.5h4.817l-.27 4.217a.75.75 0 101.487.144l.24-3.75h4.467l-.27 4.217a.75.75 0 101.487.144l.24-3.75h4.817a.75.75 0 000-1.5h-4.022l.353-5.5h4.022a.75.75 0 000-1.5h-4.817l.27-4.217a.75.75 0 00-1.487-.144l-.24 3.75H7.521l.27-4.217z"
              />
            </svg>
          </div>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">
          Reset Your Password
        </h1>
        <p class="text-gray-600">Enter your new password below</p>
      </div>

      <!-- Form -->
      <form id="resetForm" class="space-y-4">
        <!-- Password Field -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2"
            >New Password</label
          >
          <div class="relative">
            <input
              type="password"
              id="password"
              placeholder="Enter new password"
              required
              minlength="6"
              class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-500 transition"
            />
          </div>
          <p class="text-xs text-gray-500 mt-1">Minimum 6 characters</p>
        </div>

        <!-- Confirm Password Field -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2"
            >Confirm Password</label
          >
          <div class="relative">
            <input
              type="password"
              id="confirmPassword"
              placeholder="Confirm password"
              required
              minlength="6"
              class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-500 transition"
            />
          </div>
        </div>

        <!-- Error Message -->
        <div
          id="errorMessage"
          class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded"
          role="alert"
        >
          <p id="errorText"></p>
        </div>

        <!-- Success Message -->
        <div
          id="successMessage"
          class="hidden bg-green-100 border-l-4 border-green-500 text-green-700 p-4 rounded"
        >
          <p id="successText"></p>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          id="submitBtn"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200 flex items-center justify-center"
        >
          <span id="btnText">Reset Password</span>
          <span id="btnLoader" class="hidden ml-2">
            <svg
              class="animate-spin h-5 w-5"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
          </span>
        </button>

        <!-- Back to Login -->
        <div class="text-center pt-4 border-t border-gray-200">
          <p class="text-gray-600 text-sm">
            Remembered your password?
            <a
              href="./homepage.html"
              class="text-green-600 hover:text-green-700 font-bold"
              >Back to Login</a
            >
          </p>
        </div>
      </form>
    </div>

    <script>
      // Get API base URL
      const API_BASE_URL = "http://localhost:5002";

      // Extract query parameters
      const urlParams = new URLSearchParams(window.location.search);
      const resetToken = urlParams.get("token");
      const email = urlParams.get("email");

      // Show error if token or email is missing
      if (!resetToken || !email) {
        showError("Invalid reset link. Please request a new password reset.");
        document.getElementById("submitBtn").disabled = true;
      }

      // Form submission
      document
        .getElementById("resetForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const password = document.getElementById("password").value;
          const confirmPassword =
            document.getElementById("confirmPassword").value;

          // Validate passwords match
          if (password !== confirmPassword) {
            showError("Passwords do not match");
            return;
          }

          // Validate password length
          if (password.length < 6) {
            showError("Password must be at least 6 characters");
            return;
          }

          try {
            // Show loading state
            showLoading(true);

            const response = await fetch(
              `${API_BASE_URL}/users/reset-password`,
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  email,
                  resetToken,
                  newPassword: password,
                }),
              },
            );

            const data = await response.json();

            if (response.ok && data.success) {
              showSuccess(
                "Password reset successfully! Redirecting to login...",
              );
              document.getElementById("submitBtn").disabled = true;

              // Redirect to homepage after 2 seconds
              setTimeout(() => {
                window.location.href = "./homepage.html";
              }, 2000);
            } else {
              showError(data.message || "Failed to reset password");
            }
          } catch (err) {
            console.error("Reset password error:", err);
            showError("Error resetting password. Please try again.");
          } finally {
            showLoading(false);
          }
        });

      // Helper functions
      function showError(message) {
        const errorDiv = document.getElementById("errorMessage");
        const errorText = document.getElementById("errorText");
        errorText.textContent = message;
        errorDiv.classList.remove("hidden");
        document.getElementById("successMessage").classList.add("hidden");
      }

      function showSuccess(message) {
        const successDiv = document.getElementById("successMessage");
        const successText = document.getElementById("successText");
        successText.textContent = message;
        successDiv.classList.remove("hidden");
        document.getElementById("errorMessage").classList.add("hidden");
      }

      function showLoading(isLoading) {
        document.getElementById("submitBtn").disabled = isLoading;
        document
          .getElementById("btnText")
          .classList.toggle("hidden", isLoading);
        document
          .getElementById("btnLoader")
          .classList.toggle("hidden", !isLoading);
      }

      function clearMessages() {
        document.getElementById("errorMessage").classList.add("hidden");
        document.getElementById("successMessage").classList.add("hidden");
      }

      // Clear messages when user starts typing
      document
        .getElementById("password")
        .addEventListener("input", clearMessages);
      document
        .getElementById("confirmPassword")
        .addEventListener("input", clearMessages);
    </script>
  </body>
</html>
